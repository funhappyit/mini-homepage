services:
  mysql:
    image: mysql:8.4
    container_name: mini-homepage-mysql
    restart: unless-stopped
    ports:
      - "3316:3306"
    environment:
      MYSQL_DATABASE: mini_homepage
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root1234}
      MYSQL_USER: ${MYSQL_USER:-mini_homepage}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-mini_homepage}
      TZ: Asia/Seoul
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root1234}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:
